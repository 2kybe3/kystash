on: [push]
jobs:
  lint:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: https://github.com/cachix/install-nix-action@v31
      - name: Setup Attic
        run: |
          nix profile add "nixpkgs#attic-client"
          attic login main https://attic.kybe.xyz/main ${{ secrets.ATTIC_KEY }}
          attic use main
      - name: Run checks
        run: |
          nix flake check \
            --max-jobs 32
      - name: Push to Attic
        if: always()
        run: attic push main $(ls -d /nix/store/*/)
